version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fieldsight-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  inference:
    build: ./inference_service
    container_name: fieldsight-inference
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./capstone_weights:/weights
    environment:
      - MODEL_PATH=${MODEL_WEIGHTS_PATH:-/weights/capstone_weights/best (4).pt}

volumes:
  postgres_data: